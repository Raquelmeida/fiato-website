<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>FIATO - Acesso Restrito</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <style>
        body { background-color: #0d233a; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h3 class="title is-4 has-text-centered mb-5">FIATO Backoffice 🔒</h3>
        
        <form action="/backoffice/login" method="POST">
            <div class="field">
                <label class="label">Palavra-passe de Administrador</label>
                <div class="control">
                    <input class="input" type="password" name="password" placeholder="••••••••" required autofocus>
                </div>
                <p id="error-msg" class="help is-danger is-hidden">Palavra-passe incorreta. Tenta novamente.</p>
            </div>
            <button class="button is-danger is-fullwidth mt-4" type="submit">Entrar no Painel</button>
        </form>
    </div>

    <script>
        if (window.location.search.includes('error=1')) {
            document.getElementById('error-msg').classList.remove('is-hidden');
        }
    </script>
</body>
</html>
