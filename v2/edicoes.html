    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <body>
    <header class="navbar navbar--transparent">
      <div class="navbar__inner">
        <a href="index.html" class="navbar__logo">FIATO</a>

        <nav class="navbar__menu" aria-label="Navegação principal">
          <a href="index.html" class="navbar__link">FIATO</a>
          <a href="agenda.html" class="navbar__link">AGENDA</a>
          <a href="edicoes.html" class="navbar__link navbar__link--active">EDIÇÕES</a>

          <a href="contactos.html" class="navbar__link">CONTACTOS</a>

        <div class="navbar__right">
          <div class="navbar__language" aria-label="Idioma">
            <button type="button" class="navbar__language-option">EN</button>
            <button type="button" class="navbar__language-option navbar__language-option--active">PT</button>
          </div>

          <button type="button" class="navbar__toggle" aria-label="Abrir menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>

    <main class="edicoes-page navbar_height">
      <section class="edition-section edition-section--navy" data-navbar-theme="navy" data-edition-year="2026">
        <button type="button" class="edition-section__button" aria-label="Ver edição 2026" data-edition-toggle="2026">
          ↓
        </button>

        <div class="edition-section__content">
          <h2 class="edition-section__year">2026</h2>
          <p class="edition-section__subtitle">Edição Atual</p>
        </div>

      <section class="edition-section edition-section--orange" data-navbar-theme="orange" data-edition-year="2025">
        <button type="button" class="edition-section__button edition-section__button--open" aria-label="Ver edição 2025" data-edition-toggle="2025">
          ↓
        </button>

        <div class="edition-section__content">
          <h2 class="edition-section__year">2025</h2>
          <p class="edition-section__subtitle">Ópera à Moda do Porto</p>
        </div>
      </section>

      <section class="edition-section edition-section--navy" data-navbar-theme="navy" data-edition-year="2024">
        <button type="button" class="edition-section__button" aria-label="Ver edição 2024" data-edition-toggle="2024">
          ↓
        </button>

        <div class="edition-section__content">
          <h2 class="edition-section__year">2024</h2>
          <p class="edition-section__subtitle">Primeira edição do FIATO</p>
        </div>

        <nav aria-label="Rodapé secundário">

          <a href="mailto:info@fiato.pt">E-mail</a>
